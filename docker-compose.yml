version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php.dockerfile
    image: product-inventory-app
    container_name: product-inventory-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis
    networks:
      - inventory-network

  web:
    image: nginx:alpine
    container_name: product-inventory-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - inventory-network

  db:
    image: postgres:15-alpine
    container_name: product-inventory-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - inventory-network

  redis:
    image: redis:alpine
    container_name: product-inventory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - inventory-network

networks:
  inventory-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
